<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>MEM — Middle Eastern Monitor</title>
<meta name="description" content="Real-time Middle East conflict intelligence. Live ACLED data, FIRMS fires, market impact.">
<meta name="theme-color" content="#070a10">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Full-screen map — THE hero -->
<div id="map"></div>
<div class="map-vignette"></div>

<!-- Classification strip -->
<div class="class-strip top">UNCLASSIFIED // FOR OFFICIAL USE ONLY</div>
<div class="class-strip bottom">UNCLASSIFIED // FOR OFFICIAL USE ONLY</div>

<!-- HUD: Top bar -->
<div class="hud-top">
  <div class="hud-brand">
    <div class="pulse-dot"></div>
    <div class="brand-stack">
      <span class="brand-mem">MEM</span>
      <span class="brand-full">MIDDLE EASTERN MONITOR</span>
    </div>
  </div>
  <div class="hud-center">
    <div class="day-block">
      <span class="day-num" id="dayCount">34</span>
      <span class="day-unit">DAYS</span>
    </div>
    <div class="esc-block">
      <div class="esc-ring" id="escRing">
        <svg viewBox="0 0 48 48"><circle cx="24" cy="24" r="20" class="esc-bg"/><circle cx="24" cy="24" r="20" class="esc-arc" id="escArc"/></svg>
        <span class="esc-val" id="escVal">--</span>
      </div>
      <span class="esc-label" id="escLabel">ESCALATION</span>
    </div>
    <div class="clock-block">
      <span class="clock-time" id="clock">--:--</span>
      <span class="clock-zone">UTC</span>
    </div>
  </div>
  <div class="hud-stats">
    <div class="stat-pill"><span class="stat-n" id="statEvents">--</span><span class="stat-l">EVENTS</span></div>
    <div class="stat-pill red"><span class="stat-n" id="statFatal">--</span><span class="stat-l">KIA</span></div>
    <div class="stat-pill orange"><span class="stat-n" id="statFires">--</span><span class="stat-l">FIRMS</span></div>
  </div>
</div>

<!-- HUD: Intel feed (left, floating) -->
<div class="hud-left" id="hudLeft">
  <div class="feed-header">
    <span class="feed-title">INTEL FEED</span>
    <div class="feed-tabs">
      <button class="ftab active" data-tab="news">NEWS</button>
      <button class="ftab" data-tab="acled">ACLED</button>
    </div>
  </div>
  <div class="feed-scroll" id="feedScroll">
    <div class="feed-pane active" id="pane-news">
      <div class="feed-loading"><div class="spin"></div>Connecting...</div>
    </div>
    <div class="feed-pane" id="pane-acled">
      <div class="feed-loading"><div class="spin"></div>Loading ACLED...</div>
    </div>
  </div>
</div>

<!-- HUD: Right data strip -->
<div class="hud-right" id="hudRight">
  <!-- Markets -->
  <div class="r-section">
    <div class="r-header">MARKETS</div>
    <div class="r-body" id="rMarkets"><span class="r-loading">Loading...</span></div>
  </div>
  <!-- Nuclear -->
  <div class="r-section">
    <div class="r-header nuc">NUCLEAR</div>
    <div class="r-body" id="rNuclear"></div>
  </div>
  <!-- Fronts -->
  <div class="r-section">
    <div class="r-header fronts">ACTIVE FRONTS</div>
    <div class="r-body" id="rFronts"></div>
  </div>
</div>

<!-- HUD: Bottom ticker -->
<div class="hud-ticker">
  <span class="ticker-tag">LIVE</span>
  <div class="ticker-scroll"><div class="ticker-track" id="tickerTrack"></div></div>
</div>

<!-- HUD: Map controls -->
<div class="hud-map-ctrl">
  <button class="mc-btn" id="zME">ME</button>
  <button class="mc-btn" id="zIR">IR</button>
  <button class="mc-btn" id="zGZ">GZ</button>
  <button class="mc-btn" id="zYE">YE</button>
</div>

<!-- Breaking alert -->
<div class="breaking" id="breaking" style="display:none">
  <span class="brk-tag">BREAKING</span>
  <span class="brk-text" id="brkText"></span>
  <button class="brk-x" id="brkClose">&times;</button>
</div>

<script src="app.js"></script>
</body>
</html>
